<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap — OpenCrate BMS</title>
  <meta name="description" content="OpenCrate BMS development roadmap — track what's done, in progress, and planned.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0F0E0C; --bg-elevated: #1A1816; --bg-card: #1E1C19; --bg-card-hover: #26231F;
  --border: #2A2723; --border-accent: rgba(196, 122, 90, 0.15);
  --text: #F0EBE3; --text-secondary: #9E9589; --text-muted: #5E5850;
  --accent: #C47A5A; --accent-bright: #E09070; --accent-glow: rgba(196, 122, 90, 0.08);
  --green: #5A9A6B; --green-glow: rgba(90, 154, 107, 0.12); --green-border: rgba(90, 154, 107, 0.25);
  --blue: #5A8AC4; --blue-glow: rgba(90, 138, 196, 0.12); --blue-border: rgba(90, 138, 196, 0.25);
  --radius: 8px; --radius-lg: 16px;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); line-height: 1.6; }
a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
a:hover { color: var(--accent-bright); }

/* Nav */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(15, 14, 12, 0.9); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
.nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 17px; color: var(--text); letter-spacing: -0.02em; text-decoration: none; }
.nav-logo img { width: 26px; height: 26px; }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a { color: var(--text-muted); font-size: 13px; font-weight: 500; letter-spacing: 0.02em; text-transform: uppercase; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.nav-links a.active { color: var(--accent); }
.nav-cta { padding: 6px 16px; border: 1px solid var(--accent); border-radius: 100px; color: var(--accent) !important; font-size: 12px !important; font-weight: 600 !important; letter-spacing: 0.04em !important; }
.nav-cta:hover { background: var(--accent); color: var(--bg) !important; }

/* Page */
.page { max-width: 1200px; margin: 0 auto; padding: 120px 40px 80px; }
.page-header { margin-bottom: 48px; }
.page-header h1 { font-family: var(--serif); font-size: clamp(36px, 5vw, 52px); font-weight: 400; letter-spacing: -0.02em; margin-bottom: 12px; }
.page-header h1 em { font-style: italic; color: var(--accent); }
.page-sub { font-size: 16px; color: var(--text-secondary); font-weight: 300; max-width: 600px; }
.updated { font-family: var(--mono); font-size: 11px; color: var(--text-muted); margin-top: 12px; letter-spacing: 0.04em; }

/* Stats bar */
.stats { display: flex; gap: 32px; margin-bottom: 48px; padding: 24px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
.stat { text-align: center; }
.stat-val { font-family: var(--serif); font-size: 36px; font-weight: 400; letter-spacing: -0.02em; }
.stat-val.done { color: var(--green); }
.stat-val.progress { color: var(--blue); }
.stat-val.planned { color: var(--text-muted); }
.stat-label { font-family: var(--mono); font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

/* Progress bar */
.progress-bar { height: 6px; border-radius: 3px; background: var(--border); margin-bottom: 56px; display: flex; overflow: hidden; }
.progress-bar .done { background: var(--green); }
.progress-bar .in-progress { background: var(--blue); }

/* Tier */
.tier { margin-bottom: 56px; }
.tier-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.tier-badge { font-family: var(--mono); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 10px; border-radius: 100px; flex-shrink: 0; }
.tier-badge.done { background: var(--green-glow); border: 1px solid var(--green-border); color: var(--green); }
.tier-badge.in-progress { background: var(--blue-glow); border: 1px solid var(--blue-border); color: var(--blue); }
.tier-badge.planned { background: var(--accent-glow); border: 1px solid var(--border-accent); color: var(--text-muted); }
.tier-name { font-family: var(--serif); font-size: 28px; font-weight: 400; letter-spacing: -0.01em; }
.tier-desc { font-size: 14px; color: var(--text-secondary); font-weight: 300; margin-bottom: 20px; padding-left: 2px; }

/* Item grid */
.items { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.item { padding: 18px 20px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg-card); transition: border-color 0.2s, background 0.2s; position: relative; }
.item:hover { background: var(--bg-card-hover); }
.item.done { border-color: var(--green-border); }
.item.done::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--green); border-radius: var(--radius) var(--radius) 0 0; }
.item.in-progress { border-color: var(--blue-border); }
.item.in-progress::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--blue); border-radius: var(--radius) var(--radius) 0 0; }
.item-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.item-id { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.04em; }
.item-check { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.item.done .item-check { border-color: var(--green); background: var(--green); }
.item.done .item-check::after { content: '\2713'; color: #0F0E0C; font-size: 10px; font-weight: 700; }
.item.in-progress .item-check { border-color: var(--blue); }
.item.in-progress .item-check::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); }
.item-name { font-size: 14px; font-weight: 500; color: var(--text); }
.item.done .item-name { color: var(--text-secondary); }
.item-desc { font-size: 12.5px; color: var(--text-muted); line-height: 1.5; font-weight: 300; }
.item-meta { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.item-date { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 0.02em; }
.item-dep { font-family: var(--mono); font-size: 10px; color: var(--blue); letter-spacing: 0.02em; padding: 1px 6px; border: 1px solid var(--blue-border); border-radius: 4px; }
.item-tag { font-family: var(--mono); font-size: 9px; color: var(--text-muted); letter-spacing: 0.04em; padding: 1px 6px; border: 1px solid var(--border); border-radius: 4px; text-transform: uppercase; }

/* Footer */
.footer { padding: 32px 0; border-top: 1px solid var(--border); margin-top: 40px; }
.footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 40px; font-size: 12px; color: var(--text-muted); }

/* Responsive */
@media (max-width: 768px) {
  .page { padding: 100px 24px 60px; }
  .stats { gap: 16px; flex-wrap: wrap; }
  .items { grid-template-columns: 1fr; }
  .nav-links a:not(.nav-cta) { display: none; }
}
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="./" class="nav-logo"><img src="opencrate_icon.svg" alt="">OpenCrate</a>
      <div class="nav-links">
        <a href="./">Home</a>
        <a href="docs/">Docs</a>
        <a href="roadmap.html" class="active">Roadmap</a>
        <a href="https://github.com/rbhans/opencrate-bms" target="_blank" class="nav-cta">GitHub</a>
      </div>
    </div>
  </nav>

  <main class="page" id="page">
    <div class="page-header">
      <h1>Product <em>Roadmap</em></h1>
      <p class="page-sub">What's built, what's next, and where we're headed.</p>
      <p class="updated" id="updated"></p>
    </div>
    <div class="stats" id="stats"></div>
    <div class="progress-bar" id="progress"></div>
    <div id="tiers"></div>
    <div class="footer"><div class="footer-inner">Data sourced from <a href="https://github.com/rbhans/opencrate-bms/blob/main/docs/roadmap.md">docs/roadmap.md</a></div></div>
  </main>

  <script>
(async function() {
  const res = await fetch('docs-src/roadmap.json');
  if (!res.ok) { document.getElementById('tiers').innerHTML = '<p>Could not load roadmap data.</p>'; return; }
  const data = await res.json();

  document.getElementById('updated').textContent = 'Updated ' + data.updated;

  // Count items
  const all = data.tiers.flatMap(t => t.items);
  const done = all.filter(i => i.status === 'done').length;
  const inProg = all.filter(i => i.status === 'in-progress').length;
  const planned = all.filter(i => i.status === 'planned').length;
  const total = all.length;

  // Stats
  document.getElementById('stats').innerHTML =
    `<div class="stat"><div class="stat-val done">${done}</div><div class="stat-label">Done</div></div>` +
    `<div class="stat"><div class="stat-val progress">${inProg}</div><div class="stat-label">In Progress</div></div>` +
    `<div class="stat"><div class="stat-val planned">${planned}</div><div class="stat-label">Planned</div></div>` +
    `<div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Total</div></div>`;

  // Progress bar
  const pDone = (done / total * 100).toFixed(1);
  const pProg = (inProg / total * 100).toFixed(1);
  document.getElementById('progress').innerHTML =
    `<div class="done" style="width:${pDone}%"></div><div class="in-progress" style="width:${pProg}%"></div>`;

  // Tiers
  const tiersEl = document.getElementById('tiers');
  tiersEl.innerHTML = data.tiers.map(tier => {
    const tierDone = tier.items.filter(i => i.status === 'done').length;
    const tierTotal = tier.items.length;
    const tierStatus = tierDone === tierTotal ? 'done' : tier.items.some(i => i.status === 'done' || i.status === 'in-progress') ? 'in-progress' : 'planned';
    const badgeLabel = tierStatus === 'done' ? 'Complete' : tierStatus === 'in-progress' ? `${tierDone}/${tierTotal} done` : 'Planned';

    const items = tier.items.map(item => {
      const desc = item.description ? `<div class="item-desc">${item.description}</div>` : '';
      const date = item.completed ? `<span class="item-date">${item.completed}</span>` : '';
      const dep = item.depends ? `<span class="item-dep">needs ${item.depends}</span>` : '';
      const tags = (item.tags || []).map(t => `<span class="item-tag">${t}</span>`).join('');
      const meta = (date || dep || tags) ? `<div class="item-meta">${date}${dep}${tags}</div>` : '';

      return `<div class="item ${item.status}">
        <div class="item-top">
          <div class="item-check"></div>
          <span class="item-id">${item.id}</span>
        </div>
        <div class="item-name">${item.name}</div>
        ${desc}${meta}
      </div>`;
    }).join('');

    return `<div class="tier">
      <div class="tier-header">
        <span class="tier-badge ${tierStatus}">${badgeLabel}</span>
        <span class="tier-name">${tier.name}</span>
      </div>
      <p class="tier-desc">${tier.description}</p>
      <div class="items">${items}</div>
    </div>`;
  }).join('');
})();
  </script>
</body>
</html>
